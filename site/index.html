<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Docs Search</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --border-color: #30363d;
            --accent-color: #58a6ff;
            --card-bg: #161b22;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.5;
        }

        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--accent-color);
        }

        #search-box {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            margin-bottom: 2rem;
            box-sizing: border-box; /* Fix padding issue */
        }

        #search-box:focus {
            outline: 2px solid var(--accent-color);
            border-color: transparent;
        }

        .result-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: transform 0.1s ease;
        }

        .result-item:hover {
            border-color: var(--accent-color);
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-color);
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
        }

        .result-title:hover {
            text-decoration: underline;
        }

        .result-path {
            font-size: 0.85rem;
            color: #8b949e;
            margin-bottom: 0.5rem;
        }

        .result-snippet {
            font-size: 0.95rem;
            color: var(--text-color);
            white-space: pre-wrap; /* Preserve line breaks if needed, or use normal */
        }
        
        .highlight {
            background-color: rgba(210, 153, 34, 0.4); /* Gold/Yellow highlight */
            color: #ffffff;
            padding: 0 2px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <h1>🔍 Linux Docs Search</h1>

    <input type="text" id="search-box" placeholder="Type to search commands, cheatsheets..." autofocus>

    <div id="results"></div>

    <script>
        let searchIndex = [];

        // Fetch the index
        fetch('search_index.json')
            .then(response => response.json())
            .then(data => {
                searchIndex = data;
                console.log("Index loaded:", searchIndex.length, "items");
            })
            .catch(err => console.error("Failed to load search index:", err));

        const searchBox = document.getElementById('search-box');
        const resultsDiv = document.getElementById('results');

        searchBox.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            resultsDiv.innerHTML = '';

            if (query.length < 2) return;

            const results = searchIndex.filter(item => {
                return item.title.toLowerCase().includes(query) || 
                       item.content.toLowerCase().includes(query);
            });

            // Display top 20 results
            results.slice(0, 20).forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';

                // Create a clear snippet
                let snippet = "No content match found (matched title)";
                
                // Find position of the match
                const contentLower = item.content.toLowerCase();
                const matchIndex = contentLower.indexOf(query);
                
                if (matchIndex !== -1) {
                    const start = Math.max(0, matchIndex - 50);
                    const end = Math.min(item.content.length, matchIndex + 100);
                    snippet = item.content.substring(start, end);
                    if (start > 0) snippet = "..." + snippet;
                    if (end < item.content.length) snippet = snippet + "...";
                    
                    // Highlight logic (basic regex replace for display)
                    const regex = new RegExp(`(${query})`, 'gi');
                    snippet = snippet.replace(regex, '<span class="highlight">$1</span>');
                }

                div.innerHTML = `
                    <div class="result-path">${item.category} / ${item.title}</div>
                    <a href="${item.path}" class="result-title">${item.title}</a>
                    <div class="result-snippet">${snippet}</div>
                `;
                resultsDiv.appendChild(div);
            });
        });
    </script>

</body>
</html>
